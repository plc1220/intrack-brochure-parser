name: CI and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'intrack-brochure-parser' }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'default' }}
  ECS_SERVICE: ${{ vars.ECS_SERVICE || 'intrack-brochure-parser' }}
  ECS_EXECUTION_ROLE_ARN: ${{ vars.ECS_EXECUTION_ROLE_ARN }}
  ECS_INFRASTRUCTURE_ROLE_ARN: ${{ vars.ECS_INFRASTRUCTURE_ROLE_ARN }}
  ECS_TASK_ROLE_ARN: ${{ vars.ECS_TASK_ROLE_ARN }}
  BEDROCK_MODEL_ID: ${{ vars.BEDROCK_MODEL_ID || 'amazon.nova-lite-v1:0' }}

jobs:
  ci:
    name: Typecheck and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify production bundle
        run: test -f dist/server.cjs && test -f dist/index.html

  deploy:
    name: Deploy to Amazon ECS Express Mode
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deployment configuration
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        run: |
          test -n "${AWS_DEPLOY_ROLE_ARN}" || (echo "Missing production secret: AWS_DEPLOY_ROLE_ARN" && exit 1)
          test -n "${AWS_REGION}" || (echo "Missing production variable: AWS_REGION" && exit 1)
          test -n "${AWS_ACCOUNT_ID}" || (echo "Missing production variable: AWS_ACCOUNT_ID" && exit 1)
          test -n "${ECR_REPOSITORY}" || (echo "Missing production variable: ECR_REPOSITORY" && exit 1)
          test -n "${ECS_CLUSTER}" || (echo "Missing production variable: ECS_CLUSTER" && exit 1)
          test -n "${ECS_SERVICE}" || (echo "Missing production variable: ECS_SERVICE" && exit 1)
          test -n "${ECS_EXECUTION_ROLE_ARN}" || (echo "Missing production variable: ECS_EXECUTION_ROLE_ARN" && exit 1)
          test -n "${ECS_INFRASTRUCTURE_ROLE_ARN}" || (echo "Missing production variable: ECS_INFRASTRUCTURE_ROLE_ARN" && exit 1)
          test -n "${ECS_TASK_ROLE_ARN}" || (echo "Missing production variable: ECS_TASK_ROLE_ARN" && exit 1)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "image-uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"

      - name: Deploy to ECS Express Mode
        id: deploy
        uses: aws-actions/amazon-ecs-deploy-express-service@v1
        with:
          service-name: ${{ env.ECS_SERVICE }}
          image: ${{ steps.build-image.outputs.image-uri }}
          execution-role-arn: ${{ env.ECS_EXECUTION_ROLE_ARN }}
          infrastructure-role-arn: ${{ env.ECS_INFRASTRUCTURE_ROLE_ARN }}
          task-role-arn: ${{ env.ECS_TASK_ROLE_ARN }}
          cluster: ${{ env.ECS_CLUSTER }}
          container-port: 3000
          health-check-path: /health
          min-task-count: 1
          max-task-count: 2
          environment-variables: |
            [
              {"name": "NODE_ENV", "value": "production"},
              {"name": "AWS_REGION", "value": "${{ env.AWS_REGION }}"},
              {"name": "BEDROCK_MODEL_ID", "value": "${{ env.BEDROCK_MODEL_ID }}"}
            ]

      - name: Show service endpoint
        run: |
          echo "Deployed endpoint: ${{ steps.deploy.outputs.endpoint }}"
